<a
  class="friend-link not-prose block-bg block-hover flex items-center gap-4 rounded-lg p-4 no-underline"
  href="{{ url }}"
  target="_blank"
  rel="noopener noreferrer"
>
  {%- if avatar is defined %}
  <img
    class="my-0 shrink-0 rounded-full border border-black/10 bg-black/5 dark:border-white/10"
    src="{{ avatar | safe }}"
    alt="{{ name | escape_xml | safe }}"
    width="56"
    height="56"
  />
  {%- else %}
  <div
    class="friend-link-placeholder flex shrink-0 items-center justify-center rounded-full border border-black/10 bg-black/5 text-lg font-bold text-black/70 dark:border-white/10 dark:text-white/70"
    aria-hidden="true"
  >{{ name | safe }}</div>
  {%- endif %}
  <div class="min-w-0">
    <div class="truncate font-bold text-black dark:text-white">{{ name }}</div>
    {%- if desc is defined %}
    <div class="truncate text-sm opacity-80">{{ desc }}</div>
    {%- endif %}
  </div>
</a>
