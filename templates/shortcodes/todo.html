{% if title %}
	{% set title = title %}
{% else %}
	{% set title = "TODO" %}
{% endif %}
<div class="my-4 flex flex-col rounded-lg bg-(--admonition-bg)" style="--admonition-bg: var(--admonition-todo);">
	<div class="flex items-center rounded-t-lg bg-(--admonition-bg) p-1">
		<div class="mx-2 h-4 w-4 text-[0px] [background:var(--url)_center_center_no-repeat] dark:invert"
			style="--url: url(icons/todo.svg)">
		</div>
		<span><strong>{{ title }}</strong></span>
	</div>
	<div class="pl-4">
		<p>尚待完成。</p>
	</div>
</div>
